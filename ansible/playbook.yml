---
- hosts: aws
  become: true
  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Copy app folder to server using synchronize
      ansible.builtin.synchronize:
        src: ../app/
        dest: /home/ubuntu/app/
        recursive: yes
        delete: yes

    - name: Build Docker image
      community.docker.docker_image:
        name: myapp
        build:
          path: /home/ubuntu/app/
          dockerfile: /home/ubuntu/app/Dockerfile
        state: present

    - name: Run Docker container
      community.docker.docker_container:
        name: myapp_container
        image: myapp
        state: started
        ports:
          - "3000:3000"